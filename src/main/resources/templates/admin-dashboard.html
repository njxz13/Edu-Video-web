<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台首页 - EduVideo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f5f5;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .sidebar-menu a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: #3498db;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 30px;
        }

        .page-header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .page-header h1 {
            color: #2c3e50;
            font-size: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
        }

        .content-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .content-section h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        table th {
            background: #f8f9fa;
            color: #2c3e50;
            font-weight: 600;
        }

        table tr:hover {
            background: #f8f9fa;
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 13px;
            border-radius: 3px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .logout-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #34495e;
        }

        .logout-link a {
            color: #e74c3c;
            text-decoration: none;
        }

        .logout-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🔧 管理后台</h2>
                <p>EduVideo</p>
            </div>
            <nav class="sidebar-menu">
                <a href="/admin/dashboard" class="active">📊 数据统计</a>
                <a href="/admin/users">👥 用户管理</a>
                <a href="/admin/videos">🎬 视频管理</a>
                <a href="/home">🏠 返回前台</a>
                <a href="/videos">🎥 视频广场</a>
            </nav>
            <div class="logout-link">
                <a href="/admin/logout">退出登录</a>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="page-header">
                <h1>数据统计</h1>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" th:text="${userCount}">0</div>
                    <div class="stat-label">总用户数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" th:text="${videoCount}">0</div>
                    <div class="stat-label">总视频数</div>
                </div>
            </div>

            <!-- 热门视频排行 -->
            <div class="content-section">
                <h3>🔥 热门视频 TOP 10</h3>
                <table th:if="${hotVideos != null && !hotVideos.isEmpty()}">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>标题</th>
                            <th>上传者</th>
                            <th>播放次数</th>
                            <th>点赞数</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="video, iterStat : ${hotVideos}">
                            <td th:text="${iterStat.index + 1}">1</td>
                            <td th:text="${video.title}">视频标题</td>
                            <td th:text="${video.uploaderName}">上传者</td>
                            <td th:text="${video.viewCount}">0</td>
                            <td th:text="${video.likeCount}">0</td>
                        </tr>
                    </tbody>
                </table>
                <p th:if="${hotVideos == null || hotVideos.isEmpty()}">暂无数据</p>
            </div>

            <!-- 最新注册用户 -->
            <div class="content-section">
                <h3>🆕 最新注册用户</h3>
                <table th:if="${recentUsers != null && !recentUsers.isEmpty()}">
                    <thead>
                        <tr>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>注册时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${recentUsers}">
                            <td th:text="${user.username}">用户名</td>
                            <td th:text="${user.email != null ? user.email : '未设置'}">邮箱</td>
                            <td th:text="${#dates.format(user.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        </tr>
                    </tbody>
                </table>
                <p th:if="${recentUsers == null || recentUsers.isEmpty()}">暂无数据</p>
            </div>
        </div>
    </div>
</body>
</html>
