<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - EduVideo</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}" href="/css/profile.css">
    <style>
        /* 内联关键样式，确保即使外部 CSS 加载失败也能正常显示 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .profile-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .profile-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .avatar-display {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <h1>个人中心</h1>
            <p>欢迎回来，<span th:text="${username}">用户</span></p>
        </div>

        <div th:if="${success}" class="success-message">
            <span th:text="${success}"></span>
        </div>

        <div class="avatar-section">
            <div class="avatar-display" th:if="${user != null && user.avatar != null && !user.avatar.isEmpty()}">
                <img th:src="${user.avatar}" alt="头像" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
            </div>
            <div class="avatar-display empty-avatar" th:unless="${user != null && user.avatar != null && !user.avatar.isEmpty()}">
                <span th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}">U</span>
            </div>
        </div>

        <div class="profile-info">
            <div class="info-item">
                <div class="info-label">用户名</div>
                <div class="info-value" th:text="${user != null ? user.username : username}">用户名</div>
            </div>

            <div class="info-item">
                <div class="info-label">邮箱</div>
                <div class="info-value" th:text="${user != null ? user.email : '未设置'}">邮箱</div>
            </div>

            <div class="info-item" th:if="${user != null && user.userId != null}">
                <div class="info-label">用户 ID</div>
                <div class="info-value" th:text="${user.userId}">1</div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/home" class="btn btn-success">返回首页</a>
            <a href="/videos" class="btn btn-primary">浏览视频</a>
            <a href="/edit-profile" class="btn btn-primary">编辑资料</a>
            <a href="/logout" class="btn btn-secondary">退出登录</a>
        </div>
    </div>
</body>
</html>
