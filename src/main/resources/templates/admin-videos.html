<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频管理 - EduVideo 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; }
        .sidebar-header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #34495e; margin-bottom: 20px; }
        .sidebar-header h2 { font-size: 20px; margin-bottom: 5px; }
        .sidebar-menu a { display: block; color: #ecf0f1; text-decoration: none; padding: 12px 15px; margin-bottom: 5px; border-radius: 5px; transition: all 0.3s; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: #3498db; }
        .main-content { flex: 1; padding: 30px; }
        .page-header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        .page-header h1 { color: #2c3e50; font-size: 24px; }
        .content-section { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
        .content-section h3 { color: #2c3e50; margin-bottom: 20px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { padding: 12px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        table th { background: #f8f9fa; color: #2c3e50; font-weight: 600; }
        table tr:hover { background: #f8f9fa; }
        .btn-sm { padding: 5px 12px; font-size: 13px; border-radius: 3px; text-decoration: none; display: inline-block; margin-right: 5px; cursor: pointer; border: none; }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .logout-link { display: block; text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #34495e; }
        .logout-link a { color: #e74c3c; text-decoration: none; }
        .logout-link a:hover { text-decoration: underline; }
        .success-message { background-color: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #2e7d32; }
        .error-message { background-color: #fee; color: #c33; padding: 12px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #c33; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🔧 管理后台</h2>
                <p>EduVideo</p>
            </div>
            <nav class="sidebar-menu">
                <a href="/admin/dashboard">📊 数据统计</a>
                <a href="/admin/users">👥 用户管理</a>
                <a href="/admin/videos" class="active">🎬 视频管理</a>
                <a href="/home">🏠 返回前台</a>
                <a href="/videos">🎥 视频广场</a>
            </nav>
            <div class="logout-link">
                <a href="/admin/logout">退出登录</a>
            </div>
        </div>
        <div class="main-content">
            <div class="page-header">
                <h1>🎬 视频管理</h1>
            </div>
            <div th:if="${success}" class="success-message"><span th:text="${success}"></span></div>
            <div th:if="${error}" class="error-message"><span th:text="${error}"></span></div>
            <div class="content-section">
                <h3>视频列表</h3>
                <table th:if="${videos != null && !videos.isEmpty()}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>标题</th>
                            <th>上传者</th>
                            <th>播放次数</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="video : ${videos}">
                            <td th:text="${video.videoId}">1</td>
                            <td th:text="${video.title}">视频标题</td>
                            <td th:text="${video.uploaderName}">上传者</td>
                            <td th:text="${video.viewCount}">0</td>
                            <td>
                                <span th:if="${video.status == 1}" style="color: #2ecc71;">已发布</span>
                                <span th:if="${video.status == 0}" style="color: #95a5a6;">审核中</span>
                                <span th:if="${video.status == 2}" style="color: #e74c3c;">已下架</span>
                            </td>
                            <td>
                                <a th:href="@{'/video/' + ${video.videoId}}" class="btn-sm btn-primary" target="_blank">查看</a>
                                <form action="#" th:if="${video.status == 1}" th:action="@{'/admin/video/' + ${video.videoId} + '/status'}" method="post" style="display: inline;">
                                    <input type="hidden" name="status" value="2">
                                    <button type="submit" class="btn-sm btn-warning">下架</button>
                                </form>
                                <form action="#" th:if="${video.status == 2}" th:action="@{'/admin/video/' + ${video.videoId} + '/status'}" method="post" style="display: inline;">
                                    <input type="hidden" name="status" value="1">
                                    <button type="submit" class="btn-sm btn-success">上架</button>
                                </form>
                                <form action="#" th:action="@{'/admin/video/' + ${video.videoId} + '/delete'}" method="post" style="display: inline;">
                                    <button type="submit" class="btn-sm btn-danger" onclick="return confirm('确定要删除该视频吗？')">删除</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <p th:if="${videos == null || videos.isEmpty()}">暂无视频数据</p>
            </div>
        </div>
    </div>
</body>
</html>
