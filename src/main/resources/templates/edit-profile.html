<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑资料 - EduVideo</title>
    <link rel="stylesheet" th:href="@{/css/edit-profile.css}">
</head>
<body>
    <div class="edit-profile-container">
        <div class="edit-profile-header">
            <div class="logo">E</div>
            <h1>编辑个人资料</h1>
            <p>修改您的个人信息</p>
        </div>

        <div th:if="${error}" class="error-message">
            <span th:text="${error}"></span>
        </div>

        <div th:if="${success}" class="success-message">
            <span th:text="${success}"></span>
        </div>

        <form action="/edit-profile" method="post">
            <div class="avatar-preview">
                <div class="avatar-display" th:if="${user != null && user.avatar != null && !user.avatar.isEmpty()}">
                    <img th:src="${user.avatar}" alt="头像" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                </div>
                <div class="avatar-display empty-avatar" th:unless="${user != null && user.avatar != null && !user.avatar.isEmpty()}">
                    <span th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">U</span>
                </div>
            </div>

            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" 
                       th:value="${user != null ? user.username : username}" required 
                       placeholder="请输入用户名（3-20 位字符）" 
                       minlength="3" maxlength="20" autocomplete="username">
                <small>3-20 位字符，可包含字母、数字和下划线</small>
            </div>

            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" 
                       th:value="${user != null ? user.email : ''}" required 
                       placeholder="请输入邮箱地址" autocomplete="email">
                <small>用于找回密码和接收通知</small>
            </div>

            <div class="form-group">
                <label for="avatar">头像 URL</label>
                <input type="url" id="avatar" name="avatar" 
                       th:value="${user != null ? user.avatar : ''}"
                       placeholder="请输入头像图片链接（可选）">
                <small>留空则显示默认头像</small>
            </div>

            <button type="submit" class="submit-btn">保存修改</button>
            
            <div class="cancel-link">
                <a href="/profile">返回个人中心</a> | 
                <a href="/home">返回首页</a>
            </div>
        </form>
    </div>

    <script>
        // 前端验证邮箱格式
        document.querySelector('form').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value;
            const emailRegex = /^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
            
            if (!emailRegex.test(email)) {
                e.preventDefault();
                alert('请输入正确的邮箱格式！');
                return false;
            }
        });
    </script>
</body>
</html>
