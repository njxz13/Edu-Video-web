<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频列表 - EduVideo</title>
    <link rel="stylesheet" th:href="@{/css/video-list.css}">
</head>
<body>
    <div class="page-container">
        <!-- 顶部导航 -->
        <nav class="navbar">
            <div class="container">
                <div class="logo">EduVideo</div>
                <div class="nav-links">
                    <a href="/home">首页</a>
                    <a href="/videos" class="active">视频</a>
                    <a href="/upload" class="btn-upload">上传视频</a>
                    <a href="/profile">个人中心</a>
                    <a href="/logout" th:if="${session.username}" style="color: red;">退出登录</a>
                    <a href="/login" th:unless="${session.username}" style="color: #3498db;">登录</a>
                </div>
            </div>
        </nav>

        <!-- 搜索筛选区 -->
        <div class="search-section">
            <div class="container">
                <form action="/videos" method="get" class="search-form">
                    <input type="text" name="keyword" placeholder="搜索视频..." 
                           th:value="${param.keyword}" class="search-input">
                    <button type="submit" class="search-btn">搜索</button>
                </form>
            </div>
        </div>

        <!-- 视频列表 -->
        <div class="container">
            <h2 class="section-title">全部视频</h2>
            
            <div class="video-grid" th:if="${videos != null && !videos.isEmpty()}">
                <div class="video-card" th:each="video : ${videos}">
                    <a th:href="@{/video/{id}(id=${video.videoId})}" class="video-link">
                        <div class="video-cover">
                            <img th:src="${video.coverUrl != null ? video.coverUrl : '/images/default-cover.jpg'}" 
                                 th:alt="${video.title}" class="cover-image">
                            <div class="duration" th:text="${#strings.substring(video.duration / 60 + ':', 0, 5)}">10:00</div>
                        </div>
                        <div class="video-info">
                            <h3 class="video-title" th:text="${video.title}">视频标题</h3>
                            <p class="video-meta">
                                <span class="uploader" th:text="${video.uploaderName}">上传者</span>
                                <span class="views">
                                    <i class="icon-eye"></i> <span th:text="${video.viewCount}">0</span>次播放
                                </span>
                            </p>
                        </div>
                    </a>
                </div>
            </div>

            <div class="empty-state" th:if="${videos == null || videos.isEmpty()}">
                <p>暂无视频，快来上传第一个视频吧！</p>
                <a href="/upload" class="btn-primary">立即上传</a>
            </div>
        </div>
    </div>
</body>
</html>
